ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [com.jordi9.skeleton.AppKt.server]
  }
}

greeting {
  message = "World"
}

database {
  url = "jdbc:sqlite:skeleton.db"
  user = "prod_user"
}

tracing {
  serviceName = "skeleton"
  serviceVersion = ${?APP_VERSION}
  otlpEndpoint = "http://localhost:4317"
  otlpEnabled = false
  logFormat = "PRETTY"
}

cors {
  allowAnyLocalhost = true
}

# Local overrides (gitignored) - create application-local.conf to override settings
include "application-local"
