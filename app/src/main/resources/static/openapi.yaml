openapi: 3.0.3
info:
  title: Skeleton API
  version: 0.1.0
  description: Skeleton application built with Ktor and hexagonal architecture

servers:
  - url: http://localhost:8080

paths:
  /hello:
    get:
      summary: Hello greeting
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Greeting message
          content:
            text/plain:
              schema:
                type: string

  /api/v1/items:
    get:
      summary: List all items
      responses:
        '200':
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemResponse'
    post:
      summary: Create a new item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /api/v1/items/{id}:
    get:
      summary: Get item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '404':
          description: Item not found

  /health:
    get:
      summary: Health check (all checks)
      responses:
        '200':
          description: All health checks passed

  /health/liveness:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive

  /health/readiness:
    get:
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready

  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: Metrics in Prometheus text format

components:
  schemas:
    ItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string

    CreateItemRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
